<!DOCTYPE html>
<html lang="gl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.D. Valdoviño</title>
  <meta http-equiv="refresh" content="0; url=/gl/">
  <link rel="canonical" href="/gl/">
</head>
<body>
  <script>
    var stored = localStorage.getItem('sdv.locale');
    var lang   = (navigator.language || '').startsWith('es') && stored !== 'gl' ? 'es' : 'gl';
    if (stored === 'es') lang = 'es';
    window.location.replace('/' + lang + '/');
  </script>
  <noscript>
    <a href="/gl/">Ir á web en galego</a> · <a href="/es/">Ver en español</a>
  </noscript>
</body>
</html>
